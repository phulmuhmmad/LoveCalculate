<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div class="page">
    <div class="container main-content" id="mainContent">
      <h1>Love Calculator</h1>
      <p>Enter your name and your partner's name, then click Calculate.</p>

      <div class="form-row">
        <label for="yourName">Your Name</label>
        <input type="text" id="yourName" placeholder="Enter your name" />
      </div>

      <div class="form-row">
        <label for="partnerName">Partner Name</label>
        <input type="text" id="partnerName" placeholder="Enter partner's name" />
      </div>

      <button id="calculateBtn">Calculate</button>
    </div>

    <div class="container result-screen hidden" id="resultScreen">
      <div class="heart-display">
        <div class="name-side left-side">
          <span id="yourNameResult">--</span>
            <span class="share-value" id="yourShareResult">--%</span>
          </div>

          <div class="heart-center">
            <div class="love-value"><span id="lovePercent">--</span>%</div>
          </div>

          <div class="name-side right-side">
            <span id="partnerNameResult">--</span>
            <span class="share-value" id="partnerShareResult">--%</span>
          </div>
        </div>

        <button class="secondary-btn" id="resetBtn">Try Again</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
